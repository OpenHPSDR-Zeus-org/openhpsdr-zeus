name = "zeus-remote-broker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Branded custom domain (Cloudflare auto-creates the DNS record on deploy).
# Requires the openhpsdrzeus.com zone on this Cloudflare account.
# remote.openhpsdrzeus.com is the canonical broker endpoint.
#
# The /go/* path route on the apex lets the QR's vanity address
# (openhpsdrzeus.com/go/<callsign>) resolve to this worker's /go handler,
# which 302-redirects to the web client. It is a narrow path match — the rest
# of openhpsdrzeus.com stays served by the marketing Pages project.
routes = [
  { pattern = "remote.openhpsdrzeus.com", custom_domain = true },
  { pattern = "openhpsdrzeus.com/go/*", zone_name = "openhpsdrzeus.com" },
]

workers_dev = true

[vars]
# Host (radio) registration is QRZ-gated by default; client signaling is open
# (the radio's session password is the real gate). For local `wrangler dev`:
#   wrangler dev --var QRZ_VERIFY:off
QRZ_VERIFY = "on"
# Where /go/<callsign> sends the browser (the web client on Cloudflare Pages).
# app.openhpsdrzeus.com is the zeus-web-app Pages project (the SPA); the apex
# openhpsdrzeus.com stays the marketing site and must NOT be used here.
WEB_APP_ORIGIN = "https://app.openhpsdrzeus.com"

# Per-callsign WebRTC signaling room (WebSocket Hibernation).
[[durable_objects.bindings]]
name = "SIGNAL_ROOM"
class_name = "SignalRoom"

# Per-IP connection rate limiter.
[[durable_objects.bindings]]
name = "RATE_DO"
class_name = "RateLimiter"

# Support-availability presence (single global object; ~90s heartbeat expiry).
[[durable_objects.bindings]]
name = "PRESENCE"
class_name = "PresenceRoom"

# Credential-based admin store, shared with the chat relay. Create it once and
# copy the printed id into BOTH wrangler.toml files (broker + zeuschat-relay):
#   wrangler d1 create zeus-admin
#   wrangler d1 migrations apply zeus-admin   # applies migrations/0001_admin.sql
[[d1_databases]]
binding = "ADMIN_DB"
database_name = "zeus-admin"
database_id = "REPLACE_WITH_d1_create_OUTPUT"

# SQLite-backed DO namespaces (free-plan compatible).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RateLimiter"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["PresenceRoom"]

# TURN credentials are minted from Cloudflare Realtime. Provide the key out of
# band so it stays out of source control:
#   wrangler secret put TURN_KEY_ID
#   wrangler secret put TURN_API_TOKEN
# If unset, /turn returns 503 and clients fall back to STUN-only (direct P2P).

# Bootstrap admin: seeded the first time the `admins` table is empty. Set BOTH
# out of band so they stay out of source control:
#   wrangler secret put ADMIN_BOOTSTRAP_CALLSIGN
#   wrangler secret put ADMIN_BOOTSTRAP_PASSWORD
# Optional — if unset, no bootstrap admin is created (legacy env.ADMINS, if set,
# still migrates to password-less rows).
